    <script>
      (() => {
        const yearEl = document.getElementById("js-year");
        if (yearEl) yearEl.textContent = String(new Date().getFullYear());

        // --- Teaser collage images (preset manifest) ---
        // Prefers: ./assets/presets/manifest.json
        // Fallback: ./assets/teaser/manifest.json (placeholders)
        const loadImageManifest = async (url) => {
          try {
            const res = await fetch(url, { cache: "no-store" });
            if (!res.ok) return [];
            const data = await res.json();
            const images = Array.isArray(data?.images) ? data.images.filter(Boolean) : [];
            return images.filter((p) => typeof p === "string" && p.trim()).map((p) => p.trim());
          } catch {
            return [];
          }
        };

        const canLoadImage = (url, timeoutMs = 6000) =>
          new Promise((resolve) => {
            const img = new Image();
            let done = false;
            const finish = (ok) => {
              if (done) return;
              done = true;
              clearTimeout(timer);
              // Prevent late handlers from firing after resolve.
              img.onload = null;
              img.onerror = null;
              resolve(ok);
            };
            const timer = setTimeout(() => finish(false), timeoutMs);
            img.onload = () => finish(true);
            img.onerror = () => finish(false);
            img.src = url;
          });

        const shuffleInPlace = (arr) => {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          return arr;
        };

        const filterLoadableImages = async (images, maxChecks = 20) => {
          const pool = shuffleInPlace(images.slice());
          const checked = pool.slice(0, Math.max(1, Math.min(pool.length, maxChecks)));
          const results = await Promise.all(checked.map((p) => canLoadImage(p)));
          return checked.filter((p, i) => results[i]);
        };

        const applyTeaserManifest = async () => {
          const tiles = Array.from(
            document.querySelectorAll(".teaser__collage img.teaser__tile")
          );
          if (!tiles.length) return;

          try {
            const presetCandidates = await loadImageManifest("./assets/presets/manifest.json");
            let images = presetCandidates.length
              ? await filterLoadableImages(presetCandidates, 28)
              : [];

            if (!images.length) {
              const fallback = await loadImageManifest("./assets/teaser/manifest.json");
              images = fallback.length ? await filterLoadableImages(fallback, 10) : [];
            }

            if (!images.length) return;

            // Ensure the loop seam is invisible by applying the same image
            // to the same "slot" in both duplicated collages.
            const slots = new Map();
            for (const img of tiles) {
              const slot = img.getAttribute("data-teaser-slot") ?? "";
              if (!slots.has(slot)) slots.set(slot, []);
              slots.get(slot).push(img);
            }

            const slotKeys = Array.from(slots.keys()).sort((a, b) => Number(a) - Number(b));
            const pool = shuffleInPlace(images.slice());
            slotKeys.forEach((slot, i) => {
              const next = pool[i % pool.length];
              if (typeof next !== "string" || !next) return;
              for (const img of slots.get(slot)) {
                img.onerror = () => {
                  img.onerror = null;
                  img.src = "./assets/teaser/02.svg";
                };
                img.src = next;
              }
            });

            // Also randomize any explicit "outcome" images that opt in.
            const randomTargets = Array.from(document.querySelectorAll("img[data-random-preset='true']"));
            for (const img of randomTargets) {
              const next = pool[Math.floor(Math.random() * pool.length)];
              if (!next) continue;
              img.onerror = () => {
                img.onerror = null;
                img.src = "./assets/teaser/02.svg";
              };
              img.src = next;
            }
          } catch {
            // Ignore manifest errors; placeholders remain.
          }
        };

        applyTeaserManifest();
      })();
    </script>
